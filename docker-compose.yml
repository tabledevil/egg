services:
  ctf:
    image: nico-quiz-web:deploy
    build: .
    container_name: quiz-web
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:8080"
    environment:
      - QUIZ_BASE_URL=http://quiz.ktf.ninja
    volumes:
      - ./docker/QuizLauncherInstaller-macos.zip:/app/QuizLauncherInstaller-macos.zip:ro
